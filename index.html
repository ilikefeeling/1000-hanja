<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>천자문 — 한석봉 서예와 함께하는 한자 암기</title>
  <meta name="description" content="한석봉 천자문을 기반으로 스토리텔링과 서예 감상을 통해 한자의 음과 훈을 장기 기억하는 웹 앱" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/src/styles/design-system.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />
</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav id="main-nav" class="bottom-nav">
      <a href="#/" class="nav-item active" data-page="home" id="nav-home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>홈</span>
      </a>
      <a href="#/learn" class="nav-item" data-page="learn" id="nav-learn">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span>학습</span>
      </a>
      <a href="#/gallery" class="nav-item" data-page="gallery" id="nav-gallery">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>서예</span>
      </a>
      <a href="#/quiz" class="nav-item" data-page="quiz" id="nav-quiz">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>퀴즈</span>
      </a>
      <a href="#/progress" class="nav-item" data-page="progress" id="nav-progress">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>진도</span>
      </a>
    </nav>

    <!-- Page Container -->
    <main id="page-container" class="page-container"></main>
  </div>

  <!-- Character Detail Modal -->
  <div id="char-modal" class="modal-overlay hidden">
    <div class="modal-content glass-card">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
